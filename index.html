<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="description" content="RunningApexFlow — plataforma de coaching y entrenamiento para runners" />
    <link rel="manifest" href="/manifest.json" />
    <title>RunningApexFlow</title>
    <style>
      @keyframes raf-medal-shine {
        0%,
        100% {
          box-shadow: 0 0 18px rgba(245, 158, 11, 0.45), 0 0 0 1px rgba(251, 191, 36, 0.35);
        }
        50% {
          box-shadow: 0 0 32px rgba(251, 191, 36, 0.7), 0 0 0 2px rgba(245, 158, 11, 0.4);
        }
      }
      @keyframes raf-medal-glint {
        0% {
          transform: translateX(-130%) skewX(-14deg);
          opacity: 0;
        }
        18% {
          opacity: 0.5;
        }
        35%,
        100% {
          transform: translateX(230%) skewX(-14deg);
          opacity: 0;
        }
      }
      @keyframes raf-toast-pop {
        0% {
          transform: translateY(-14px) scale(0.94);
          opacity: 0;
        }
        65% {
          transform: translateY(3px) scale(1.03);
          opacity: 1;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes raf-toast-glow {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.06);
        }
      }
      .raf-medal-earned {
        position: relative;
        overflow: hidden;
        animation: raf-medal-shine 2.5s ease-in-out infinite;
      }
      .raf-medal-earned::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 38%,
          rgba(255, 255, 255, 0.65) 50%,
          transparent 62%
        );
        animation: raf-medal-glint 3.6s ease-in-out infinite;
        pointer-events: none;
      }
      .raf-medal-toast {
        animation: raf-toast-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both, raf-toast-glow 2s ease-in-out 0.55s infinite;
      }
      @keyframes raf-race-celebrate {
        0%,
        100% {
          box-shadow:
            0 0 0 2px rgba(245, 158, 11, 0.45),
            inset 0 0 18px rgba(251, 191, 36, 0.22);
        }
        50% {
          box-shadow:
            0 0 0 4px rgba(251, 191, 36, 0.55),
            inset 0 0 26px rgba(245, 158, 11, 0.32);
          transform: scale(1.015);
        }
      }
      .raf-race-day {
        animation: raf-race-celebrate 1.6s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
